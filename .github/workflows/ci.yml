name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo nextest run --workspace --profile ci

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: E2E smoke (quickstart, no network)
        run: |
          cargo run -q -p evalcore -- validate examples/quickstart/evals.yaml
          cargo run -q -p evalcore -- run examples/quickstart/evals.yaml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  action-smoke:
    name: GitHub Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Build THIS commit's binary onto PATH so the action smoke-tests the
      # repo's own code (the action skips install when evalcore is present).
      # Released binaries are what external users exercise.
      - name: Build local evalcore
        run: cargo install --path crates/evalcore --locked

      # Distinct html-artifact names: upload-artifact@v4 rejects two artifacts
      # sharing a name in one workflow run (409 Conflict), and both invocations
      # land in this single job.
      - uses: ./
        with:
          config: examples/quickstart/evals.yaml
          html-artifact: evalcore-report-quickstart

      - uses: ./
        with:
          config: examples/agent-trace/evals.yaml
          html-artifact: evalcore-report-agent-trace
