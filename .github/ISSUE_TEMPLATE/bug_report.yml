name: Bug report
description: Something behaves differently from what the docs describe
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The single most useful thing you can include is a
        minimal `evals.yaml` plus one dataset line that reproduces the problem.

        If this is a security issue, please do not file it here. See
        [SECURITY.md](https://github.com/eval-core/evalcore/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what did you get instead?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Suite that reproduces it
      description: >
        The smallest `evals.yaml` and `cases.jsonl` that shows the problem.
        Redact any URLs or model names you cannot share.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: The exact command you ran and its full output, including the exit code.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: EvalCore version
      description: "Output of `evalcore --version`, or the commit you built from."
      placeholder: "evalcore 0.7.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS 15 arm64 / Ubuntu 24.04 x64 / ubuntu-latest runner"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I am on the latest release, or I checked that this is not already fixed on `main`.
          required: true
        - label: I ran `evalcore validate <config>` and it reported the config as valid.
          required: false
