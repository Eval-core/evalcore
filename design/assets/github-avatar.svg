  <rect x="112" y="228" width="152" height="56" rx="28" fill="#f4f4f5"/>
  <rect x="112" y="316" width="190" height="56" rx="28" fill="#f4f4f5"/>
  <rect x="368" y="128" width="36" height="256" rx="18" fill="#818cf8"/>
</svg>
