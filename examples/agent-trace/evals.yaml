# Agent trajectory evaluation: no invocation, no network — EvalCore ingests
# recorded traces (native trajectory format or OTel/OpenInference JSON
# export) and asserts on what the agent actually did.
#
# Run it:  evalcore run examples/agent-trace/evals.yaml
targets:
  support-agent:
    type: trace
    cost: # prices the token usage found in the trace spans
      input_per_1m: 0.40
      output_per_1m: 1.60

datasets:
  - file: cases.jsonl

scorers:
  # Grade the final answer: trace targets extract it (native `final_output` /
  # the OTel root span) so text scorers grade the answer, not the trajectory
  # JSON. Offline, no network.
  - type: contains
    value: "30 days"
  # Grade the path: trajectory rules always operate on the steps, in parallel
  # with the answer check above — the answer and the path, one suite.
  - type: trajectory
    rules:
      - must_call: search_kb
        with:
          query: { contains: "refund" }
      - must_not_call: issue_refund
        before: verify_identity
      - max_steps: 5
