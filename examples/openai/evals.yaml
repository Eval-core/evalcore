# Live example: evaluates gpt-4.1-mini with a deterministic check AND an
# LLM judge. Needs OPENAI_API_KEY in the environment (see repo .env).
targets:
  openai:
    type: openai-compatible
    url: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_retries: 3
    cost: # verify against current OpenAI pricing; prices are yours to declare
      input_per_1m: 0.40
      output_per_1m: 1.60

datasets:
  - file: cases.jsonl

scorers:
  - type: contains
    value: "30"
  - type: judge
    url: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    rubric: "Does the answer state a concrete refund window in days?"
    threshold: 0.6
